# Frontier Corm — Local Development
#
# Usage:  make local        (or: docker compose up -d)
# Logs:   docker compose logs -f indexer
# Stop:   docker compose down
# Reset:  docker compose down -v   (removes volumes / DB data)
#
# The indexer currently uses SQLite. A postgres service is included for
# future migration and for any new services that need a relational DB.

services:
  # ── Indexer (subscriber + API on port 3100) ──────────────────────
  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://corm:corm@postgres:5432/frontier_corm
      - API_PORT=3100
      # Cleanup worker (disabled by default; set CLEANUP_ENABLED=true and provide a funded keypair)
      - CLEANUP_ENABLED=${CLEANUP_ENABLED:-false}
      - CLEANUP_WORKER_PRIVATE_KEY=${CLEANUP_WORKER_PRIVATE_KEY:-}
      - CLEANUP_DELAY_MS=${CLEANUP_DELAY_MS:-30000}
      - CLEANUP_INTERVAL_MS=${CLEANUP_INTERVAL_MS:-15000}
      - CLEANUP_MAX_RETRIES=${CLEANUP_MAX_RETRIES:-3}
      - CLEANUP_GAS_BUDGET=${CLEANUP_GAS_BUDGET:-5000000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Postgres ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: frontier_corm
      POSTGRES_USER: corm
      POSTGRES_PASSWORD: corm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corm -d frontier_corm"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Puzzle Service (Go + HTMX on port 3300) ────────────────────
  puzzle-service:
    build:
      context: ./puzzle-service
      dockerfile: Dockerfile
    ports:
      - "3300:3300"
    environment:
      - PUZZLE_PORT=3300
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3300/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
