# Frontier Corm — Local Dev (mprocs)
#
# Install:  cargo install mprocs   (or: brew install mprocs)
# Run:      mprocs
#
# Keybindings (default):
#   q        quit all
#   j/k      switch process
#   x        stop/restart focused process
#   Enter    toggle focus on log pane

procs:
  # ── SUI local network ────────────────────────────────────────────
  sui-localnet:
    shell: "RUST_LOG=\"off,sui_node=info\" sui start --with-faucet --force-regenesis"
    stop: "SIGTERM"

  # ── Postgres (via docker compose) ────────────────────────────────
  postgres:
    shell: |
      trap 'docker compose down postgres && docker volume rm frontier-corm_pgdata' EXIT
      docker compose up postgres
    stop: "SIGTERM"

  # ── World contracts (deploy + configure + seed — one-shot) ─────────
  world-contracts:
    shell: "bash scripts/deploy-world-contracts.sh"
    autostart: true

  # ── Contract publish (one-shot, waits for world, then publishes frontier-corm) ──
  contracts-publish:
    shell: "bash scripts/publish-contracts-local.sh"

  # ── Indexer (event subscriber + API on :3100) ────────────────────
  indexer:
    shell: |
      echo "Waiting for postgres and SUI localnet..."
      until docker exec frontier-corm-postgres-1 pg_isready -U corm -d frontier_corm -q 2>/dev/null; do
        sleep 1
      done
      until curl -so /dev/null -w '%{http_code}' http://127.0.0.1:9000 >/dev/null 2>&1; do
        sleep 2
      done
      echo "Waiting for contracts to be published..."
      until grep -q '^PACKAGE_TRIBE=0x' .env.localnet 2>/dev/null \
        && grep -q '^PACKAGE_CORM_AUTH=0x' .env.localnet 2>/dev/null \
        && grep -q '^PACKAGE_TRUSTLESS_CONTRACTS=0x' .env.localnet 2>/dev/null; do
        sleep 2
      done
      echo "Loading package IDs from .env.localnet"
      set -a && . ./.env.localnet && set +a
      echo "Dependencies ready — starting indexer"
      npm --prefix indexer run dev
    env:
      SUI_RPC_URL: "http://127.0.0.1:9000"
      DATABASE_URL: "postgresql://corm:corm@localhost:5432/frontier_corm"
      API_PORT: "3100"
      POLL_INTERVAL_MS: "2000"
    stop: "SIGTERM"

  # ── Web UI (Vite dev on :5173, proxies /api → indexer) ─────────────
  web:
    shell: |
      echo "Waiting for VITE_* package IDs in .env.localnet..."
      until grep -q '^VITE_TRIBE_PACKAGE_ID=0x' .env.localnet 2>/dev/null \
        && grep -q '^VITE_CORM_AUTH_PACKAGE_ID=0x' .env.localnet 2>/dev/null \
        && grep -q '^VITE_TRUSTLESS_CONTRACTS_PACKAGE_ID=0x' .env.localnet 2>/dev/null \
        && grep -q '^VITE_WORLD_PACKAGE_ID=0x' .env.localnet 2>/dev/null \
        && grep -q '^VITE_ENERGY_CONFIG_ID=0x' .env.localnet 2>/dev/null; do
        sleep 2
      done
      echo "Loading package IDs from .env.localnet"
      set -a && . ./.env.localnet && set +a
      echo "Starting Vite dev server"
      npm --prefix web run dev
    stop: "SIGTERM"

  # ── Puzzle Service (Go + HTMX on :3300) ──────────────────────────────────
  puzzle-service:
    shell: |
      cd puzzle-service
      echo "Building puzzle-service..."
      go build -o ./puzzle-service . && echo "Running puzzle-service" && ./puzzle-service
    env:
      PUZZLE_PORT: "3300"
    stop: "SIGTERM"

  # ── Giveitem Helper (Vite dev UI) ───────────────────────────────────────
  giveitem-helper:
    shell: |
      trap 'kill 0' EXIT
      npm --prefix dev-tools/giveitem-helper run dev -- --port 5175 &
      wait
    stop: "SIGINT"

  # ── DGX Spark — Setup (one-shot, syncs configs + pulls image) ──────────
  dgx-setup:
    shell: |
      set -a && [ -f .env ] && . ./.env && set +a
      : "${DGX_HOST:?Set DGX_HOST in .env}"
      DGX_USER="${DGX_USER:-$USER}"
      DGX_WORK_DIR="${DGX_WORK_DIR:-~/frontier-corm}"
      echo "Creating remote work dir on $DGX_USER@$DGX_HOST:$DGX_WORK_DIR"
      ssh "$DGX_USER@$DGX_HOST" "mkdir -p $DGX_WORK_DIR/configs"
      echo "Syncing TRT-LLM configs..."
      rsync -avz corm-brain/configs/ "$DGX_USER@$DGX_HOST:$DGX_WORK_DIR/configs/"
      echo "Pulling TRT-LLM image (if not cached)..."
      ssh "$DGX_USER@$DGX_HOST" "docker pull nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8"
      echo "DGX setup complete."
    autostart: false

  # ── DGX Spark — Nemotron 3 Super (TRT-LLM, port 8000) ─────────────────
  dgx-super:
    shell: |
      set -a && [ -f .env ] && . ./.env && set +a
      : "${DGX_HOST:?Set DGX_HOST in .env}"
      DGX_USER="${DGX_USER:-$USER}"
      DGX_WORK_DIR="${DGX_WORK_DIR:-~/frontier-corm}"
      CONTAINER=corm-trtllm-super
      echo "Starting Nemotron 3 Super on $DGX_HOST..."
      ssh "$DGX_USER@$DGX_HOST" "
        docker rm -f $CONTAINER 2>/dev/null || true
        docker run --name $CONTAINER --rm \
          --runtime nvidia --gpus all --ipc host \
          -p 8000:8000 \
          -v hf-cache:/root/.cache \
          -v $DGX_WORK_DIR/configs/trtllm-spark.yaml:/data/config-spark.yaml:ro \
          nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8 \
          trtllm-serve nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4 \
            --host 0.0.0.0 --port 8000 \
            --max_batch_size 4 \
            --trust_remote_code \
            --reasoning_parser nano-v3 \
            --tool_parser qwen3_coder \
            --config /data/config-spark.yaml
      "
    stop: "SIGINT"

  # ── DGX Spark — Nemotron 3 Nano (TRT-LLM, port 8001) ──────────────────
  dgx-nano:
    shell: |
      set -a && [ -f .env ] && . ./.env && set +a
      : "${DGX_HOST:?Set DGX_HOST in .env}"
      DGX_USER="${DGX_USER:-$USER}"
      DGX_WORK_DIR="${DGX_WORK_DIR:-~/frontier-corm}"
      CONTAINER=corm-trtllm-nano
      echo "Starting Nemotron 3 Nano on $DGX_HOST..."
      ssh "$DGX_USER@$DGX_HOST" "
        docker rm -f $CONTAINER 2>/dev/null || true
        docker run --name $CONTAINER --rm \
          --runtime nvidia --gpus all --ipc host \
          -p 8001:8001 \
          -v hf-cache:/root/.cache \
          -v $DGX_WORK_DIR/configs/trtllm-spark-nano.yaml:/data/config-spark-nano.yaml:ro \
          nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8 \
          trtllm-serve nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4 \
            --host 0.0.0.0 --port 8001 \
            --max_batch_size 8 \
            --trust_remote_code \
            --reasoning_parser nano-v3 \
            --tool_parser qwen3_coder \
            --config /data/config-spark-nano.yaml
      "
    stop: "SIGINT"

  # ── DGX Spark — SSH Tunnel (forwards model ports to localhost) ─────────
  dgx-tunnel:
    shell: |
      set -a && [ -f .env ] && . ./.env && set +a
      : "${DGX_HOST:?Set DGX_HOST in .env}"
      DGX_USER="${DGX_USER:-$USER}"
      echo "Waiting for Super (port 8000) on $DGX_HOST..."
      until ssh "$DGX_USER@$DGX_HOST" "curl -sf http://localhost:8000/health" 2>/dev/null; do
        sleep 5
      done
      echo "Waiting for Nano (port 8001) on $DGX_HOST..."
      until ssh "$DGX_USER@$DGX_HOST" "curl -sf http://localhost:8001/health" 2>/dev/null; do
        sleep 5
      done
      echo "Both models healthy — opening SSH tunnel"
      ssh -N \
        -L 8000:localhost:8000 \
        -L 8001:localhost:8001 \
        -o ServerAliveInterval=30 \
        -o ServerAliveCountMax=3 \
        "$DGX_USER@$DGX_HOST"
    stop: "SIGINT"

  # ── Corm Brain (local Go binary, connects to tunnelled DGX models) ─────
  corm-brain:
    shell: |
      echo "Waiting for postgres..."
      until docker exec frontier-corm-postgres-1 pg_isready -U corm -d frontier_corm -q 2>/dev/null; do
        sleep 1
      done
      echo "Waiting for TRT-LLM tunnel (Super on :8000)..."
      until curl -sf http://localhost:8000/health >/dev/null 2>&1; do
        sleep 3
      done
      echo "Waiting for TRT-LLM tunnel (Nano on :8001)..."
      until curl -sf http://localhost:8001/health >/dev/null 2>&1; do
        sleep 3
      done
      echo "Waiting for corm_state contract in .env.localnet..."
      until grep -q '^CORM_STATE_PACKAGE_ID=0x' .env.localnet 2>/dev/null; do
        sleep 2
      done
      echo "Loading contract IDs from .env.localnet"
      set -a && . ./.env.localnet && set +a
      # Derive SUI private key from active SUI keypair if not set
      if [ -z "$SUI_PRIVATE_KEY" ]; then
        SUI_PRIVATE_KEY=$(sui keytool export --key-identity "$(sui client active-address)" --json 2>/dev/null | jq -r '.exportedPrivateKey')
        export SUI_PRIVATE_KEY
        echo "Derived SUI_PRIVATE_KEY from active SUI address"
      fi
      echo "Dependencies ready — building corm-brain"
      cd corm-brain
      go build -o ./corm-brain . && echo "Running corm-brain" && ./corm-brain
    env:
      LLM_SUPER_URL: "http://localhost:8000"
      LLM_FAST_URL: "http://localhost:8001"
      EMBED_MODEL_PATH: "../models/nomic-embed"
      DATABASE_URL: "postgresql://corm:corm@localhost:5432/frontier_corm"
      PUZZLE_SERVICE_URL: "http://localhost:3300"
      SUI_RPC_URL: "http://127.0.0.1:9000"
      CONSOLIDATION_INTERVAL_MS: "60000"
      MEMORY_CAP_PER_CORM: "500"
      EVENT_COALESCE_MS: "50"
      WS_RECONNECT_MAX_MS: "30000"
      FALLBACK_POLL_INTERVAL_MS: "2000"
    stop: "SIGTERM"
