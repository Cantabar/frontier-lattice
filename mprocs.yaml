# Frontier Lattice — Local Dev (mprocs)
#
# Install:  cargo install mprocs   (or: brew install mprocs)
# Run:      mprocs
#
# Keybindings (default):
#   q        quit all
#   j/k      switch process
#   x        stop/restart focused process
#   Enter    toggle focus on log pane

procs:
  # ── SUI local network ────────────────────────────────────────────
  sui-localnet:
    shell: "RUST_LOG=\"off,sui_node=info\" sui start --with-faucet --force-regenesis"
    stop: "SIGTERM"

  # ── Postgres (via docker compose) ────────────────────────────────
  postgres:
    shell: |
      trap 'docker compose down postgres' EXIT
      docker compose up postgres
    stop: "SIGTERM"

  # ── DB migration (one-shot, waits for postgres) ──────────────────
  db-migrate:
    shell: |
      echo "Waiting for postgres..."
      until docker exec frontier-lattice-postgres-1 pg_isready -U lattice -d frontier_lattice -q 2>/dev/null; do
        sleep 1
      done
      echo "Postgres ready — running migration"
      npm --prefix indexer run migrate
    autostart: true

  # ── World contracts (deploy + configure + seed — one-shot) ─────────
  world-contracts:
    shell: "bash scripts/deploy-world-contracts.sh"
    autostart: true

  # ── Contract publish (one-shot, waits for world, then publishes frontier-lattice) ──
  contracts-publish:
    shell: "bash scripts/publish-contracts.sh"

  # ── Indexer (event subscriber + API on :3100) ────────────────────
  indexer:
    shell: |
      echo "Waiting for postgres and SUI localnet..."
      until docker exec frontier-lattice-postgres-1 pg_isready -U lattice -d frontier_lattice -q 2>/dev/null; do
        sleep 1
      done
      until curl -so /dev/null -w '%{http_code}' http://127.0.0.1:9000 >/dev/null 2>&1; do
        sleep 2
      done
      echo "Waiting for contracts to be published..."
      until grep -q '^PACKAGE_TRIBE=0x' .env 2>/dev/null \
        && grep -q '^PACKAGE_CONTRACT_BOARD=0x' .env 2>/dev/null \
        && grep -q '^PACKAGE_FORGE_PLANNER=0x' .env 2>/dev/null \
        && grep -q '^PACKAGE_TRUSTLESS_CONTRACTS=0x' .env 2>/dev/null; do
        sleep 2
      done
      echo "Loading package IDs from .env"
      set -a && source .env && set +a
      echo "Dependencies ready — starting indexer"
      npm --prefix indexer run dev
    env:
      SUI_RPC_URL: "http://127.0.0.1:9000"
      DATABASE_URL: "postgresql://lattice:lattice@localhost:5432/frontier_lattice"
      API_PORT: "3100"
      POLL_INTERVAL_MS: "2000"
    stop: "SIGTERM"

  # ── Web UI (Vite dev on :5173, proxies /api → indexer) ─────────────
  web:
    shell: "npm --prefix web run dev"
    stop: "SIGTERM"

  # ── Giveitem Helper (Vite dev UI) ───────────────────────────────────────
  giveitem-helper:
    shell: |
      trap 'kill 0' EXIT
      npm --prefix dev-tools/giveitem-helper run dev &
      wait
    stop: "SIGINT"
