{{define "puzzle-content.html"}}<div class="grid-container{{if .ShowEntrance}} grid-entrance{{end}}">
    {{template "grid.html" .}}
</div>

<!-- Word submission form -->
<form class="submit-form{{if .ShowEntrance}} grid-entrance{{end}}" hx-post="/puzzle/submit" hx-target="#result-area" hx-swap="innerHTML"{{if .ShowEntrance}} style="animation-delay:0.4s"{{end}}>
    <input type="text" name="word" placeholder="Enter word..." autocomplete="off" class="word-input" />
    <button type="submit" class="submit-btn">Submit</button>
</form>
<div id="result-area"></div>{{end}}
