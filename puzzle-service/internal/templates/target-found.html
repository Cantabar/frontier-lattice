{{define "target-found.html"}}<div class="target-found-overlay" hx-swap-oob="beforeend:#main-display">
    <div class="target-found-header target-found-stagger-0">&gt; PATTERN ANCHOR ISOLATED</div>
    <div class="target-found-address target-found-stagger-1">{{.Address}}</div>
    <div class="target-found-stat target-found-stagger-2">[SYS] stability +{{.StabilityGain}} → {{.Stability}}/100</div>
    <div class="target-found-stat target-found-stagger-3">ANCHORS RESOLVED: {{.SolveCount}}</div>
    <button class="target-found-btn target-found-stagger-4"
            hx-get="/puzzle?transition=1"
            hx-target="#main-display"
            hx-swap="innerHTML">[ RESOLVE NEXT ANCHOR ]</button>
</div>{{end}}
